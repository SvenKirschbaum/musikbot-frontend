name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: registry.gitlab.com
  IMAGE_NAMESPACE: fallobst22/images
  IMAGE: musikbot-frontend
  VERSION_OFFSET: 571

permissions:
  contents: read

jobs:
  docker-image:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker metadata
        id: meta
        run: |
          version=$((GITHUB_RUN_NUMBER + VERSION_OFFSET))
          image_ref="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE}"
          {
            echo "version=${version}"
            echo "primary_tag=${image_ref}:v${version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          pull: true
          push: false
          build-args: |
            VERSION=v${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.primary_tag }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.primary_tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Log in to GitLab Container Registry
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_REGISTRY_USERNAME }}
          password: ${{ secrets.GITLAB_REGISTRY_PASSWORD }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: docker push "${{ steps.meta.outputs.primary_tag }}"
